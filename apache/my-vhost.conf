<VirtualHost *:80>
    DocumentRoot /var/www/html
    
    <Directory /var/www/html>
        # C'est cette ligne qui débloque le "Forbidden"
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Envoyer les fichiers PHP au container PHP-FPM
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://php-container:9000"
    </FilesMatch>

    ErrorLog /usr/local/apache2/logs/error.log
    CustomLog /usr/local/apache2/logs/access.log combined
</VirtualHost>
